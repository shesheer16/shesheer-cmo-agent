## ============================================================================
## SECTION 1: CORE FRAMEWORKS — INDIAN BUSINESS OPERATING PRINCIPLES
## ============================================================================

frameworks:

  delta_4:
    title: "Delta 4 Framework"
    originator: "Kunal Shah (CRED, Titan Capital)"
    definition: "A product must achieve 4+ point superiority (on 1-10 scale) to change embedded Indian consumer behavior"
    discovery: "Indian consumers have exceptionally high tolerance for mediocrity due to scarcity. Only transformational improvements trigger adoption."
    
    application_mechanics:
      step_1: "Identify competitor/incumbent solution (e.g., traditional coaching centers for EdTech)"
      step_2: "Score your product vs incumbent on 10-point scale across 5 dimensions (price, quality, accessibility, community, trust)"
      step_3: "Calculate average gap: If >4 points = viable disruption, <4 = needs differentiation"
      step_4: "Apply test to EVERY product decision — if delta <4, strategy will fail"
    
    why_critical_for_edtech: "Physics Wallah = 4+ point delta on all dimensions vs traditional coaching. Byju's = claimed superiority but delivered mediocrity on unit economics."
    
    where_to_find:
      - source: "CRED Curious Podcast"
        content: "Episodes discussing behavioral economics and Delta 4"
      - source: "Twitter @kunalb11"
        content: "Philosophy threads on wealth creation and consumer psychology"
      - source: "First Principles Podcast"
        content: "Kunal Shah appearances"
    
    chromadb_annotation: "When advising on product positioning, always apply Delta 4 test. If delta <4, recommend repositioning or feature enhancement."

  india_1_2_3_consumer_stack:
    title: "India 1, India 2, India 3 Consumer Segmentation Framework"
    originator: "Sajith Pai (Blume Ventures)"
    description: "Three distinct consumer economies within India with fundamentally different psychology, purchasing power, and distribution access"
    
    segments:
      india_1:
        size_millions: "100"
        annual_spending_range: "₹5,00,000+"
        characteristics: "Urban metros, English-medium education, global exposure, digitally native, status-conscious, quality-aware"
        willingness_to_pay: "Premium pricing acceptable if justified by quality/status"
        distribution_preference: "E-commerce, direct-to-consumer, premium retail"
        marketing_lens: "Aspiration, quality, status signaling"
        edtech_example: "UpGrad targeting working professionals for career upskilling"
      
      india_2:
        size_millions: "300"
        annual_spending_range: "₹1,00,000 - ₹5,00,000"
        characteristics: "Tier 1-2 cities, Hindi/regional medium, selective digital adoption, aspirational, family-driven"
        willingness_to_pay: "Price-sensitive but willing to pay for aspirational products"
        distribution_preference: "Mobile app, YouTube, WhatsApp, regional platforms"
        marketing_lens: "Value + aspiration + peer influence"
        edtech_example: "Unacademy targeting competitive exam students (JEE, NEET)"
      
      india_3:
        size_millions: "900"
        annual_spending_range: "₹0 - ₹1,00,000"
        characteristics: "Tier 3+ cities, rural areas, vernacular language, price-first, agricultural/manual labor dependent"
        willingness_to_pay: "Extreme price sensitivity; affordability = access"
        distribution_preference: "YouTube free tier, missed calls, SMS, offline"
        marketing_lens: "Affordability as solidarity signal, trust, local language"
        edtech_example: "Physics Wallah targeting all segments but initially India 2/3"
    
    strategic_application: "Market sizing, product positioning, pricing strategy, distribution channel selection, feature prioritization"
    
    why_better_than_income: "Two households with identical income can have vastly different willingness-to-pay based on assets, debt, family obligations, savings philosophy"
    
    where_to_find:
      - source: "Indus Valley Annual Report (Blume)"
        url: "https://blume.vc/reports/indus-valley-annual-report-2025"
        content: "Complete India 1/2/3 breakdown with data"
      - source: "Sajith Pai Substack"
        url: "sajithpai.com/substack"
        content: "Quarterly India 1/2/3 analysis"
      - source: "Story Rules Podcast"
        content: "Deep interviews on consumer stratification"
    
    chromadb_annotation: "EVERY market sizing conversation starts here. India 1/2/3 determines TAM, positioning, and go-to-market strategy."

  household_potential_index_hpi:
    title: "HPI (Household Potential Index)"
    originator: "Rama Bijapurkar"
    definition: "Scientific measurement of actual household purchasing power based on asset ownership, consumption patterns, and savings — NOT raw income"
    
    why_superior_to_income: "Income is snapshot. HPI is longitudinal analysis of actual purchasing behavior across time."
    
    components:
      - "Household asset ownership (vehicle, home, appliances)"
      - "Annual income and regularity"
      - "Monthly savings rate"
      - "Household debt burden"
      - "Consumption expenditure across categories"
    
    application: "Market segmentation, TAM estimation, pricing strategy, product feature prioritization"
    
    where_to_find:
      - source: "We Are Like That Only (Rama Bijapurkar book)"
      - source: "ICE 360° Survey by PRICE"
        url: "https://www.price360.in/"
        content: "Full HPI methodology and household data"
      - source: "Regular economic columns by Rama Bijapurkar"
    
    chromadb_annotation: "Use HPI over income brackets for market sizing. If source does raw income-based TAM, flag as potentially overestimated."

  trust_first_law:
    title: "Trust Precedes Transaction"
    definition: "In Indian markets, especially Tier 2/3, trust must be established BEFORE commercial transaction can succeed"
    
    operating_principle: "Without trust, no amount of features, discounts, or marketing converts"
    
    application_edtech:
      phase_1: "Free tier builds community and proof of quality"
      phase_2: "Community advocacy generates word-of-mouth"
      phase_3: "Willing-to-pay segment emerges naturally"
      phase_4: "Monetization through voluntary paid tiers"
    
    example_success: "Physics Wallah: Free YouTube content (10M+ subscribers) → Trust → Premium courses (₹999-4999) → ₹2.2B valuation"
    
    example_failure: "Byju's: Aggressive acquisition through discounts → No trust → Toxic sales culture revealed → Collapse"
    
    warning: "Building trust is slow. Investors pressure for fast growth. This tension kills EdTech startups."
    
    where_to_find:
      - source: "First Principles Podcast (Alakh Pandey episode)"
      - source: "The Learning Trap (Pradip K Saha)"
      - source: "Physics Wallah YouTube channel (10M+ subscribers)"
      - source: "Industry case studies comparing PW vs Byju's"
    
    chromadb_annotation: "When advising EdTech founder: trust-first = slow but sustainable. Acquisition-first = fast but collapse-prone. Choose wisely."

  innovation_via_constraint:
    title: "Innovation Via Constraint"
    definition: "When resources/infrastructure are scarce, the constraint BECOMES the innovation vector. Design around absence, not abundance."
    
    iconic_example:
      campaign: "Kan Khajura Tesan (HUL 2014)"
      constraint: "Media-dark rural populations with no TV/radio access"
      innovation: "Proprietary mobile radio channel via simple missed call mechanic"
      outcome: "12M subscribers in <10 months without traditional media spend"
    
    why_indian: "Indian infrastructure is paradoxical: no reliable electricity in rural areas but 95%+ mobile penetration. Constraint-thinking = unique competitive advantage"
    
    application_edtech:
      constraint_1: "Rural students may lack broadband"
      innovation_1: "SMS-based learning, offline-first app architecture, low-bandwidth video"
      
      constraint_2: "Vernacular medium students doubted by society"
      innovation_2: "Inclusive positioning, success stories in vernacular"
      
      constraint_3: "Parents skeptical of online education"
      innovation_3: "Community-driven proof (peer reviews, live sessions)"
    
    anti_pattern: "Building feature-rich solutions assuming abundance → fails in constraint environment"
    
    chromadb_annotation: "When facing infrastructure limitations, reframe as innovation opportunity. Constraint = moat."

  price_as_solidarity_signal:
    title: "Price as Cultural Message (Not Quality Signal)"
    definition: "In Tier 2/3 India, low price can signal INCLUSION and SOLIDARITY with customer, not perceived low quality"
    
    psychology: "Tier 3 customers interpret high pricing as 'this product wasn't designed for me.' Low price = 'founder believes in my potential.'"
    
    operating_mechanics:
      high_price_interpretation: "Aspiration, status, quality (in India 1)"
      low_price_interpretation: "Inclusion, accessibility, solidarity (in India 2/3)"
    
    examples:
      nirma_1982: "Detergent at 1/5 cost of HUL's Surf. Perceived as 'quality for masses' not 'cheap product.' 38% market share."
      physics_wallah: "₹999-4999 courses. Positioned as 'affordable excellence' vs ₹50K+ coaching. Unicorn valuation."
      byju_s_failure: "High ₹5K-50K courses + aggressive discounts = confusing messaging. Students didn't trust value proposition."
    
    warning: "If you position as low-price but deliver mediocre quality, Tier 2/3 customers feel betrayed (you didn't believe in their potential)"
    
    chromadb_annotation: "Price must align with positioning. Mismatch = brand damage. Low price requires genuine quality + community proof."

  cultural_tension_marketing:
    title: "Identifying & Addressing Cultural Tension"
    definition: "Breakthrough campaigns identify deeply embedded cultural contradictions and offer resolution"
    
    mechanism: "Culture creates blindness. Blindness creates tension. Brand that solves tension wins loyalty."
    
    famous_examples:
      share_the_load_ariel:
        tension: "Working Indian women + full household burden (double shift)"
        brand_resolution: "Shift domestic equality to men"
        outcome: "Sales +76%, belief shift 79%→25%, cultural movement"
        mental_model: "Brand = social change agent, not product"
      
      touch_the_pickle_whisper:
        tension: "Menstruation taboos limiting women's freedom"
        brand_resolution: "Empower taboo-breaking"
        outcome: "2.9M pledges, Cannes Grand Prix, cultural movement"
        mental_model: "Brand = progressive force"
      
      daag_acche_hain_surfexcel:
        tension: "Anxious mothers fear dirt as parenting failure"
        brand_resolution: "Reframe dirt as learning symbol"
        outcome: "Sales spike, redefined detergent category"
        mental_model: "Brand = anxiety resolver"
    
    application_edtech:
      tension_1: "Parents believe good education = physical classroom only"
      resolution_1: "Prove digital can be superior (quality, flexibility, affordability)"
      
      tension_2: "Vernacular medium students seen as inferior"
      resolution_2: "Celebrate vernacular medium success stories"
      
      tension_3: "Girls discouraged from technical fields"
      resolution_3: "Platform celebrates female success in STEM"
    
    chromadb_annotation: "Before launching campaign, identify: What cultural blindness are we attacking? Can we own that resolution?"

  consistency_in_positioning:
    title: "Consistency Over Creative Reinvention"
    definition: "In Indian market, staying consistent with positioning across DECADES outperforms quarterly rebrand cycles"
    
    iconic_example:
      brand: "Santoor (Wipro Consumer)"
      campaign: "Santoor Mummy"
      years: "1989-2024 (35+ years)"
      positioning: "Woman remains youthful, confident after motherhood"
      outcome: "Second-largest selling soap in India despite 35-year campaign stability"
      lesson: "Indian consumers build loyalty through RECOGNITION and FAMILIARITY, not NOVELTY"
    
    contrast:
      startup_instinct: "Rebrand every quarter = chase trends = broken trust"
      indian_psychology: "Consistency = you believe in your positioning enough to stick with it"
    
    application_edtech: "PhysicsWallah positioning (affordability + quality + trust) should NOT change for 10+ years. Evolution, not revolution."
    
    chromadb_annotation: "Advise against quarterly rebrand campaigns. Position once, execute for years, let cultural penetration compound."

  language_ownership:
    title: "Owning Language in Consumer's Mental Space"
    definition: "Brand that coins or owns a specific word/phrase in target language owns the category"
    
    examples:
      thanda_matlab_coca_cola: "Genericized 'Thanda' (cold) for Coca-Cola in rural India"
      sabki_pasand_nirma: "Became cultural phrase for affordable quality detergent"
      har_ek_friend_airtel: "Youth phrase capturing friendship = network value"
    
    application_edtech: "What word/phrase can EdTech own? 'Smart Padhai'? 'Real Learning'? 'Padhai, Saral Rahe'? Brand that owns language owns category."
    
    chromadb_annotation: "In branding conversations, always ask: What word/phrase can we own in target language's consciousness?"

  character_branding_transcending_language:
    title: "Language-Agnostic Character Branding"
    definition: "Create mascots/characters that work across 22+ languages without translation"
    
    example:
      campaign: "Vodafone ZooZoos (2009)"
      mechanism: "Cute alien characters communicated without words"
      coverage: "Worked from Kerala to Kashmir, across all 22 official languages"
      outcome: "First Indian campaign to top world's most-viewed viral ads (1.45M views in 2 weeks)"
      lesson: "Characters transcend language in pan-India market"
    
    application_edtech: "Pan-India EdTech platform needs mascot recognizable across Hindi, Tamil, Telugu, Kannada, regional languages without translation"
    
    chromadb_annotation: "For pan-India campaigns, consider character/mascot branding over text-heavy approaches."

